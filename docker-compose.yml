services:
  server:
    build:
      context: ./server
    container_name: crm-server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: file:/data/dev.db
    volumes:
      - crm_data:/data

  client:
    build:
      context: ./client
    container_name: crm-client
    restart: always
    depends_on:
      - server
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  crm_data:
